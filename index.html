<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16121a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>¡PERDIDO!</title>
<style>
  :root{
    --bg:#16121a; --panel:#201a26; --panel-2:#2a2331; --line:#3a3142;
    --text:#f2edf5; --muted:#a89bb3; --accent:#e5484d;
    --radius:18px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    margin:0; background:#0e0b11; color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display:flex; justify-content:center; overflow:hidden;
  }
  #app{
    width:100%; max-width:520px; height:100dvh; display:flex; flex-direction:column;
    background:linear-gradient(180deg, var(--bg) 0%, #191320 100%);
    position:relative; overflow:hidden;
  }
  @media (min-width:560px){ #app{ border-left:1px solid var(--line); border-right:1px solid var(--line); } }
  button{
    font:inherit; color:inherit; border:0; background:none; cursor:pointer;
    touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }

  /* ---------- top bar ---------- */
  #topbar{
    display:none; align-items:center; gap:10px;
    padding:10px 14px; padding-top:calc(10px + env(safe-area-inset-top));
    background:color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line); z-index:5;
  }
  #btn-home{ font-size:20px; line-height:1; padding:6px 4px; color:var(--muted); }
  #hearts{ font-size:15px; letter-spacing:1px; white-space:nowrap; }
  #hearts .lost{ filter:grayscale(1) brightness(.55); }
  #goal-chip{
    flex:1; min-width:0; text-align:center; font-size:13px; font-weight:600;
    padding:6px 10px; border-radius:999px;
    border:1px solid color-mix(in srgb, var(--accent) 55%, transparent);
    background:color-mix(in srgb, var(--accent) 14%, transparent);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #streak-chip{ font-size:13px; font-weight:700; display:none; white-space:nowrap; }
  #btn-lifeline{
    font-size:14px; font-weight:700; padding:7px 11px; border-radius:999px;
    border:1px solid var(--line); background:var(--panel); white-space:nowrap;
    transition:transform .1s ease, opacity .2s;
  }
  #btn-lifeline:active{ transform:scale(.94); }
  #btn-lifeline.off{ opacity:.35; pointer-events:none; }

  /* ---------- chat ---------- */
  #chat{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
    display:none; flex-direction:column; gap:10px; padding:16px 14px 8px;
  }
  .bubble{
    max-width:82%; padding:11px 14px; font-size:16px; line-height:1.45;
    animation:pop .28s cubic-bezier(.2,.9,.3,1.2) both;
  }
  .npc{
    align-self:flex-start; background:var(--panel-2); color:var(--text);
    border-radius:var(--radius) var(--radius) var(--radius) 6px;
    box-shadow:0 1px 2px rgba(0,0,0,.25);
  }
  .npc .w{ cursor:pointer; border-radius:4px; }
  .npc .w:active{ background:color-mix(in srgb, var(--accent) 35%, transparent); }
  .me{
    align-self:flex-end; color:#fff;
    background:linear-gradient(160deg, var(--accent), color-mix(in srgb, var(--accent) 72%, #000));
    border-radius:var(--radius) var(--radius) 6px var(--radius);
  }
  .line{
    align-self:center; text-align:center; max-width:90%;
    font-size:13.5px; color:var(--muted); font-style:italic; line-height:1.5;
    animation:pop .28s ease both;
  }
  .line.obj{
    font-style:normal; font-weight:700; color:var(--text); font-size:14px;
    padding:7px 14px; border-radius:999px;
    border:1px dashed color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .line.hype{
    font-style:normal; font-weight:800; font-size:17px; color:var(--accent);
    animation:hype .5s cubic-bezier(.2,.9,.3,1.4) both;
  }
  .line.heal{ font-style:normal; font-weight:800; color:#ff8fa0; font-size:15px; }
  .line.hint{ font-size:12.5px; opacity:.85; }
  .trans{
    align-self:flex-start; max-width:82%; margin-top:-4px;
    font-size:13.5px; color:var(--muted); padding:9px 13px; line-height:1.45;
    border:1px dashed var(--line); border-radius:6px var(--radius) var(--radius) var(--radius);
    animation:pop .28s ease both;
  }
  .typing span{
    display:inline-block; width:7px; height:7px; margin:2px 2px; border-radius:50%;
    background:var(--muted); animation:blink 1s infinite;
  }
  .typing span:nth-child(2){ animation-delay:.18s; }
  .typing span:nth-child(3){ animation-delay:.36s; }

  /* ---------- dictionary lookup strip ---------- */
  #lookup{
    display:none; align-items:center; gap:10px; margin:0 14px 8px;
    padding:10px 13px; font-size:14px; line-height:1.4;
    background:var(--panel-2); border:1px solid var(--line);
    border-left:3px solid var(--accent); border-radius:12px;
    animation:pop .2s ease both;
  }
  #lookup-body{ flex:1; min-width:0; color:var(--muted); overflow-wrap:anywhere; }
  #lookup-body b{ color:var(--text); }
  #lookup-x{ flex:none; color:var(--muted); font-size:16px; padding:4px 6px; }

  /* ---------- choices ---------- */
  #choices{
    display:none; flex-direction:column; gap:9px;
    padding:12px 14px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
    background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .choice{
    display:flex; align-items:center; gap:11px; text-align:left; width:100%;
    min-height:54px; padding:12px 14px; font-size:15.5px; line-height:1.35;
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    transition:transform .08s ease, border-color .15s, background .15s;
    animation:rise .3s ease both;
  }
  .choice:nth-child(2){ animation-delay:.06s; }
  .choice:nth-child(3){ animation-delay:.12s; }
  .choice:nth-child(4){ animation-delay:.18s; }
  .choice:active{ transform:scale(.975); background:var(--panel-2); border-color:var(--accent); }
  .choice .num{
    flex:none; width:22px; height:22px; border-radius:7px; font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); background:var(--panel-2);
  }
  @media (pointer:coarse){ .choice .num{ display:none; } }

  /* ---------- home ---------- */
  #home{
    flex:1; display:flex; flex-direction:column; justify-content:center; gap:12px;
    padding:24px 20px calc(24px + env(safe-area-inset-bottom));
    padding-top:calc(24px + env(safe-area-inset-top));
    overflow-y:auto;
  }
  #home h1{
    margin:0; font-size:44px; letter-spacing:-1px; text-align:center;
    text-shadow:0 3px 0 rgba(0,0,0,.35);
  }
  #home .tag{ margin:0 0 18px; text-align:center; color:var(--muted); font-size:15px; }
  .card{
    display:flex; align-items:center; gap:14px; width:100%; text-align:left;
    padding:16px; border-radius:18px; background:var(--panel);
    border:1px solid var(--line); border-left:5px solid var(--c);
    transition:transform .08s ease; animation:rise .35s ease both;
  }
  .card:nth-child(4){ animation-delay:.07s; }
  .card:nth-child(5){ animation-delay:.14s; }
  .card:active{ transform:scale(.975); }
  .card .emoji{ font-size:34px; }
  .card b{ display:block; font-size:17px; }
  .card small{ color:var(--muted); font-size:13px; }
  .card .dif{ margin-left:auto; font-size:12px; font-weight:700; white-space:nowrap; }
  .dif.d1{ color:#4cb56d; }
  .dif.d2{ color:#eda13c; }
  .dif.d3{ color:#e5484d; }
  #home .foot{ text-align:center; color:var(--muted); font-size:12px; margin-top:14px; line-height:1.7; }

  /* ---------- end overlay ---------- */
  #overlay{
    position:absolute; inset:0; z-index:20; display:none;
    align-items:flex-end; justify-content:center;
    background:rgba(10,7,13,.62); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  #overlay .sheet{
    width:100%; max-height:88%; overflow-y:auto;
    background:var(--panel); border-radius:24px 24px 0 0;
    padding:26px 22px calc(24px + env(safe-area-inset-bottom));
    animation:sheet .35s cubic-bezier(.2,.9,.3,1.1) both;
  }
  #overlay h2{ margin:0 0 4px; font-size:26px; text-align:center; }
  #overlay .sub{ margin:0 0 18px; text-align:center; color:var(--muted); font-size:14.5px; line-height:1.5; }
  .stats{ display:flex; gap:9px; margin-bottom:18px; }
  .stat{
    flex:1; text-align:center; padding:12px 6px; border-radius:14px;
    background:var(--panel-2); border:1px solid var(--line);
  }
  .stat b{ display:block; font-size:20px; }
  .stat small{ color:var(--muted); font-size:11.5px; }
  .vocab h3{ margin:0 0 10px; font-size:14px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; }
  .vocab .row{
    display:flex; justify-content:space-between; gap:12px; padding:8px 2px;
    border-bottom:1px solid var(--line); font-size:14.5px;
  }
  .vocab .row:last-child{ border-bottom:0; }
  .vocab .es{ font-weight:700; }
  .vocab .en{ color:var(--muted); text-align:right; }
  .btns{ display:flex; gap:10px; margin-top:20px; }
  .btn{
    flex:1; min-height:52px; border-radius:16px; font-size:16px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    transition:transform .08s ease;
  }
  .btn:active{ transform:scale(.96); }
  .btn.primary{ background:var(--accent); color:#fff; }
  .btn.ghost{ background:var(--panel-2); border:1px solid var(--line); }

  /* ---------- fx ---------- */
  .shake{ animation:shake .4s ease; }
  #confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:30; }
  #confetti i{
    position:absolute; top:-14px; width:9px; height:13px; border-radius:2px;
    animation:fall linear both;
  }
  @keyframes pop{ from{ opacity:0; transform:translateY(10px) scale(.96); } to{ opacity:1; transform:none; } }
  @keyframes rise{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:none; } }
  @keyframes hype{ 0%{ opacity:0; transform:scale(.4); } 60%{ transform:scale(1.15); } 100%{ opacity:1; transform:scale(1); } }
  @keyframes blink{ 0%,80%,100%{ opacity:.25; } 40%{ opacity:1; } }
  @keyframes shake{
    0%,100%{ transform:translateX(0); } 15%{ transform:translateX(-8px); } 35%{ transform:translateX(7px); }
    55%{ transform:translateX(-5px); } 75%{ transform:translateX(3px); }
  }
  @keyframes sheet{ from{ transform:translateY(60px); opacity:0; } to{ transform:none; opacity:1; } }
  @keyframes fall{
    from{ transform:translateY(-5vh) rotate(0turn); opacity:1; }
    to{ transform:translateY(105vh) rotate(2.5turn); opacity:.9; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ animation-duration:.01s !important; animation-delay:0s !important; transition:none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="btn-home" aria-label="Escenas">‹</button>
    <span id="hearts"></span>
    <span id="goal-chip"></span>
    <span id="streak-chip"></span>
    <button id="btn-lifeline">🌵 2</button>
  </div>
  <div id="home"></div>
  <div id="chat" aria-live="polite"></div>
  <div id="lookup"><span id="lookup-body"></span><button id="lookup-x" aria-label="Cerrar">✕</button></div>
  <div id="choices"></div>
  <div id="overlay"><div class="sheet"></div></div>
  <div id="confetti"></div>
</div>

<script>
"use strict";

/* ================= SCENES (all content lives here) =================
   Node graph. Choices: good:true advances (several nodes have MORE
   than one valid strategy), traps carry a written `react` and cost a
   heart. `heal:true` on a good choice restores one heart. */
var SCENES = {

  taqueria: {
    title: "La Taquería",
    place: "CDMX",
    dif: 1,
    emoji: "🌮",
    color: "#e5484d",
    goal: "🌮 Comprar 3 tacos al pastor",
    intro: "CDMX, de noche. Un puesto de tacos brilla en la esquina. Huele a gloria.",
    winText: "El taquero le entrega tres tacos perfectos. «¡Provecho, güero!» El primer bocado es gloria.",
    failText: "Te fuiste caminando, confundido y con hambre. A dos cuadras, un perro te ladró en español.",
    vocab: [
      ["al pastor", "spit-roasted pork with pineapple"],
      ["con todo", "with onion and cilantro"],
      ["el trompo", "the rotating meat spit"],
      ["güero", "blondie — friendly for a foreigner"],
      ["pica", "it's spicy"],
      ["la horchata", "sweet rice-and-cinnamon drink"],
      ["para llevar", "to go (food)"],
      ["quédese el cambio", "keep the change"]
    ],
    start: "q1",
    nodes: {
      q1: {
        npc: "¡Pásele, pásele, güero! ¿Qué le damos?",
        translation: "Come on in, blondie! What'll we get you?",
        choices: [
          { text: "Tres tacos al pastor, por favor.", next: "q2", good: true },
          { text: "¿Qué me recomienda, joven?", next: "q1r", good: true },
          { text: "Tres tacos de pastor alemán.", next: "qd1", good: false,
            react: "El taquero parpadea. «¿De pastor... alemán? ¿De perro, joven?»" },
          { text: "Dame tacos, rápido.", next: "qd2", good: false,
            react: "«Uy, qué genio. Aquí pedimos con 'por favor', güero.»" }
        ]
      },
      q1r: {
        npc: "¡El pastor, obvio! Mire el trompo: nuevecito. ¿Cuántos?",
        translation: "Al pastor, obviously! Look at the spit: brand new. How many?",
        choices: [
          { text: "Tres, por favor.", next: "q2", good: true },
          { text: "¿Trompo? ¿El juguete?", next: "qd3", good: false,
            react: "«El trompo de CARNE, joven.» Lo señala. Gira, majestuoso." },
          { text: "Cero, gracias.", next: "qd4", good: false,
            react: "«¿CERO? ¿Vino a una taquería a no comer?»" }
        ]
      },
      qd1: {
        npc: "El pastor es puerco con piña, no perro. ¿Entonces qué?",
        translation: "Al pastor is pork with pineapple, not dog. So what'll it be?",
        choices: [
          { text: "Ah, perdón. Tres al pastor, por favor.", next: "q2", good: true },
          { text: "¿Y de gato tiene?", next: "qd1b", good: false,
            react: "El taquero se persigna. «Dios mío, los turistas.»" }
        ]
      },
      qd1b: {
        npc: "Mire, joven: puerco, res, tripa. Animales de COMER.",
        translation: "Look, young man: pork, beef, tripe. EATING animals.",
        choices: [
          { text: "Puerco entonces. Tres al pastor.", next: "q2", good: true },
          { text: "¿La tripa es de gato?", next: "qab", good: false,
            react: "La señora de las aguas suspira y se acerca. «Yo me encargo, Beto.»" }
        ]
      },
      qd2: {
        npc: "A ver, otra vez. ¿Qué le damos, JOVEN?",
        translation: "Let's try again. What'll we get you, YOUNG MAN?",
        choices: [
          { text: "Perdón. Tres al pastor, por favor.", next: "q2", good: true },
          { text: "Ya te dije. Tacos.", next: "qab", good: false,
            react: "El taquero atiende a otros tres clientes. La señora de las aguas se apiada de usted." }
        ]
      },
      qab: {
        npc: "¿Está perdido, mijo? Yo le ayudo. ¿Quiere tacos, verdad?",
        translation: "Are you lost, sweetie? I'll help you. You want tacos, right?",
        choices: [
          { text: "Sí, señora. Tres al pastor, por favor.", next: "q2", good: true, heal: true,
            react: "La abuela pide por usted y le regala un agua. «Ándele, mijo.»" },
          { text: "No necesito ayuda de nadie.", next: "qd2b", good: false,
            react: "La abuela lo mira como solo una abuela puede. Duele más que la salsa." }
        ]
      },
      qd2b: {
        npc: "Bueno, mijo. ¿Entonces? ¿Tacos o su orgullo?",
        translation: "Okay, sweetie. So which is it? Tacos or your pride?",
        choices: [
          { text: "...Tacos. Tres al pastor, por favor.", next: "q2", good: true },
          { text: "Mi orgullo.", next: "qd2b", good: false,
            react: "El estómago le ruge tan fuerte que dos palomas salen volando." }
        ]
      },
      qd3: {
        npc: "El trompo es la carne que gira. ¿Cuántos tacos?",
        translation: "The trompo is the meat that spins. How many tacos?",
        choices: [
          { text: "Tres, por favor.", next: "q2", good: true },
          { text: "¿Y baila?", next: "qd3", good: false,
            react: "«Gira, joven. Bailar, solo yo los viernes.»" }
        ]
      },
      qd4: {
        npc: "¿Cuántos tacos, pues? Piense en un número feliz.",
        translation: "How many tacos, then? Think of a happy number.",
        choices: [
          { text: "Tres al pastor, por favor.", next: "q2", good: true },
          { text: "Cuarenta y siete.", next: "qd4", good: false,
            react: "«¿Cuarenta y...? Empiece con tres, campeón.»" }
        ]
      },
      q2: {
        npc: "¡Órale! Tres de pastor. ¿Con todo?",
        translation: "You got it! Three al pastor. With everything?",
        choices: [
          { text: "Sí, con todo, por favor.", next: "q3", good: true },
          { text: "¿Qué trae 'con todo'?", next: "q2r", good: true },
          { text: "¿Con todo? ¿Hasta con zapatos?", next: "qd5", good: false,
            react: "El taquero se ríe. «Con cebolla y cilantro, joven. Zapatos los martes.»" },
          { text: "No me toques.", next: "qd6", good: false,
            react: "«...Nadie lo está tocando, güero.» Silencio incómodo." }
        ]
      },
      q2r: {
        npc: "Cebolla y cilantro, joven. Lo clásico.",
        translation: "Onion and cilantro, young man. The classic.",
        choices: [
          { text: "Perfecto. Con todo, entonces.", next: "q3", good: true },
          { text: "Sin cebolla, por favor.", next: "q3", good: true },
          { text: "¿Y el cilantro sabe a jabón?", next: "qd7", good: false,
            react: "«Solo si su alma ya se rindió, joven.»" }
        ]
      },
      qd7: {
        npc: "El cilantro es vida. ¿Con todo o no?",
        translation: "Cilantro is life. With everything or not?",
        choices: [
          { text: "Con todo, por favor.", next: "q3", good: true },
          { text: "A jabón, entonces.", next: "qd7", good: false,
            react: "El taquero le pone doble cilantro. Por ofender." }
        ]
      },
      qd5: {
        npc: "Con cebolla y cilantro, pues. ¿Le pongo?",
        translation: "With onion and cilantro, that is. Want them on there?",
        choices: [
          { text: "Sí, con todo, por favor.", next: "q3", good: true },
          { text: "Cebolla no, cilantro no, todo sí.", next: "qd5", good: false,
            react: "«Eso... no tiene sentido, joven.»" }
        ]
      },
      qd6: {
        npc: "Bueno... ¿con cebolla y cilantro o no?",
        translation: "Anyway... onion and cilantro or not?",
        choices: [
          { text: "Sí, con todo. Perdón, estoy nervioso.", next: "q3", good: true },
          { text: "¿Quién te dijo mi nombre?", next: "qd6", good: false,
            react: "El taquero mira a la señora de las aguas. Ella niega con la cabeza." }
        ]
      },
      q3: {
        npc: "¿Salsa roja o verde? Le aviso: la roja pica bonito.",
        translation: "Red or green salsa? Heads up: the red one has a real kick.",
        choices: [
          { text: "La verde, por favor.", next: "q4", good: true },
          { text: "La roja. Me gusta el peligro.", next: "q3r", good: true },
          { text: "Estoy muy caliente.", next: "qd8", good: false,
            react: "El taquero suelta la carcajada. «Eso no significa lo que usted cree, güero.»" },
          { text: "Sin sopa, gracias.", next: "qd9", good: false,
            react: "«¿Sopa? Esto es taquería, no fonda, mi amigo.»" }
        ]
      },
      q3r: {
        npc: "¿Seguro, güero? La roja la hace mi suegra. Con rencor.",
        translation: "You sure, blondie? My mother-in-law makes the red one. With a grudge.",
        choices: [
          { text: "Mejor poquita, para probar.", next: "q4", good: true },
          { text: "Seguro. Échele.", next: "q3r2", good: true },
          { text: "¿Su suegra está en la salsa?", next: "qd10", good: false,
            react: "«En espíritu, joven. En espíritu.»" }
        ]
      },
      q3r2: {
        npc: "Respeto. Una lágrima es normal. ¿Algo de tomar? Lo va a necesitar.",
        translation: "Respect. One tear is normal. Something to drink? You'll need it.",
        choices: [
          { text: "Una horchata grande, por favor.", next: "q5", good: true },
          { text: "Leche, por favor.", next: "q5", good: true,
            react: "El taquero asiente lento. «¿Leche contra la de la suegra? ...Se vale.»" },
          { text: "No necesito tomar nada.", next: "qd11", good: false,
            react: "Primera mordida. Ve colores nuevos. La abuela ya le sirve un agua, por piedad." }
        ]
      },
      qd10: {
        npc: "«En espíritu», dije. Bueno: ¿roja completa o poquita?",

/* ================= game ================= */
const HYPE = ["¡Órale!", "¡Eso!", "¡Ándale!", "¡Fierro!", "¡Así se habla!"];
const DIF = ["fácil", "medio", "difícil"];
const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

const app = document.getElementById("app");
const topbar = document.getElementById("topbar");
const home = document.getElementById("home");
const chat = document.getElementById("chat");
const choicesEl = document.getElementById("choices");
const overlay = document.getElementById("overlay");
const sheet = overlay.querySelector(".sheet");
const heartsEl = document.getElementById("hearts");
const goalChip = document.getElementById("goal-chip");
const streakChip = document.getElementById("streak-chip");
const lifelineBtn = document.getElementById("btn-lifeline");
const confettiEl = document.getElementById("confetti");
const lookupEl = document.getElementById("lookup");
const lookupBody = document.getElementById("lookup-body");

let S = null; // per-run state
let busy = false;
let hintShown = false;
let runId = 0; // bumped on scene change so stale timers die

function later(ms, fn) {
  const r = runId;
  setTimeout(() => { if (r === runId) fn(); }, ms);
}

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}
function text(tag, cls, str) {
  const e = el(tag, cls);
  e.textContent = str;
  return e;
}
function scrollChat() {
  requestAnimationFrame(() => chat.scrollTo({ top: chat.scrollHeight, behavior: REDUCED ? "auto" : "smooth" }));
}
function wait(ms) { return REDUCED ? 30 : ms; }

/* ---------- home ---------- */
function showHome() {
  runId++;
  S = null;
  hideLookup();
  overlay.style.display = "none";
  topbar.style.display = "none";
  chat.style.display = "none";
  choicesEl.style.display = "none";
  home.style.display = "flex";
  home.innerHTML = "";
  home.appendChild(el("h1", null, "🇲🇽 ¡PERDIDO!"));
  home.appendChild(text("p", "tag", "Sin inglés. Sin mapa. Sobrevive la conversación."));
  const order = Object.keys(SCENES).sort((a, b) => SCENES[a].dif - SCENES[b].dif);
  for (const key of order) {
    const sc = SCENES[key];
    const card = el("button", "card");
    card.style.setProperty("--c", sc.color);
    card.appendChild(text("span", "emoji", sc.emoji));
    const info = el("span");
    info.appendChild(text("b", null, sc.title));
    info.appendChild(text("small", null, sc.place));
    card.appendChild(info);
    card.appendChild(text("span", "dif d" + sc.dif, "●".repeat(sc.dif) + "○".repeat(3 - sc.dif) + " " + DIF[sc.dif - 1]));
    card.addEventListener("click", () => startScene(key));
    home.appendChild(card);
  }
  home.appendChild(text("p", "foot", "❤️ 3 vidas · 🌵 2 traducciones por escena · 🔎 toca cualquier palabra del NPC para buscarla (con internet)"));
}

/* ---------- scene ---------- */
function startScene(key) {
  runId++;
  const scene = SCENES[key];
  S = { key, scene, nodeId: null, hearts: 3, lifelines: 2, streak: 0, turns: 0, lifelinesUsed: 0, transShown: false };
  busy = false;
  hideLookup();
  document.documentElement.style.setProperty("--accent", scene.color);
  overlay.style.display = "none";
  home.style.display = "none";
  topbar.style.display = "flex";
  chat.style.display = "flex";
  choicesEl.style.display = "flex";
  chat.innerHTML = "";
  choicesEl.innerHTML = "";
  goalChip.textContent = scene.goal;
  updateBar();
  chat.appendChild(text("div", "line", scene.intro));
  chat.appendChild(text("div", "line obj", "Objetivo: " + scene.goal));
  later(wait(700), () => goto(scene.start));
}

function updateBar() {
  heartsEl.innerHTML = "";
  for (let i = 0; i < 3; i++) {
    heartsEl.appendChild(text("span", i < S.hearts ? "" : "lost", "❤️"));
  }
  lifelineBtn.textContent = "🌵 " + S.lifelines;
  lifelineBtn.classList.toggle("off", S.lifelines === 0 || S.transShown);
  streakChip.style.display = S.streak >= 3 ? "inline" : "none";
  streakChip.textContent = "🔥" + S.streak;
}

function goto(id) {
  if (id === "win") return endScene(true);
  S.nodeId = id;
  S.transShown = false;
  updateBar();
  npcSay(S.scene.nodes[id].npc, () => showChoices(S.scene.nodes[id].choices));
}

function npcSay(str, cb) {
  const b = el("div", "bubble npc typing", "<span></span><span></span><span></span>");
  chat.appendChild(b);
  scrollChat();
  later(wait(Math.min(1500, 400 + str.length * 12)), () => {
    b.classList.remove("typing");
    b.textContent = "";
    str.split(" ").forEach((w, i) => {
      if (i) b.appendChild(document.createTextNode(" "));
      const s = el("span", "w");
      s.textContent = w;
      b.appendChild(s);
    });
    if (!hintShown) {
      hintShown = true;
      chat.appendChild(text("div", "line hint", "💡 ¿No entiendes una palabra? Tócala."));
    }
    scrollChat();
    if (cb) cb();
  });
}

function showChoices(choices) {
  choicesEl.innerHTML = "";
  const shuffled = choices.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  shuffled.forEach((c, i) => {
    const btn = el("button", "choice");
    btn.appendChild(text("span", "num", String(i + 1)));
    btn.appendChild(text("span", null, c.text));
    btn.addEventListener("click", () => pick(c));
    choicesEl.appendChild(btn);
  });
  busy = false;
}

function pick(c) {
  if (busy || !S) return;
  busy = true;
  hideLookup();
  choicesEl.innerHTML = "";
  chat.appendChild(text("div", "bubble me", c.text));
  scrollChat();
  S.turns++;

  if (c.good) {
    S.streak++;
    let healed = false;
    if (c.heal && S.hearts < 3) { S.hearts++; healed = true; }
    updateBar();
    if (c.react) {
      later(wait(400), () => {
        chat.appendChild(text("div", "line", c.react));
        scrollChat();
      });
    }
    if (healed) {
      later(wait(c.react ? 800 : 400), () => {
        chat.appendChild(text("div", "line heal", "+1 ❤️"));
        scrollChat();
      });
    }
    if (S.streak >= 3) {
      const hypeWord = HYPE[(S.streak - 3) % HYPE.length];
      later(wait(c.react || healed ? 1100 : 350), () => {
        chat.appendChild(text("div", "line hype", hypeWord + " 🔥"));
        scrollChat();
      });
    }
    later(wait(c.react || healed ? 1500 : 650), () => goto(c.next));
  } else {
    S.hearts--;
    S.streak = 0;
    updateBar();
    app.classList.remove("shake");
    void app.offsetWidth;
    if (!REDUCED) app.classList.add("shake");
    if (navigator.vibrate) navigator.vibrate(70);
    later(wait(500), () => {
      chat.appendChild(text("div", "line", c.react));
      scrollChat();
      if (S.hearts <= 0) later(wait(1100), () => endScene(false));
      else later(wait(1000), () => goto(c.next));
    });
  }
}

/* ---------- 🌵 lifeline: full-line translation ---------- */
lifelineBtn.addEventListener("click", () => {
  if (!S || S.lifelines === 0 || S.transShown || !S.nodeId) return;
  S.lifelines--;
  S.lifelinesUsed++;
  S.transShown = true;
  updateBar();
  chat.appendChild(text("div", "trans", "🌵 " + S.scene.nodes[S.nodeId].translation));
  scrollChat();
});

/* ---------- 🔎 word lookup: online dictionary, NPC lines only ---------- */
const lookupCache = new Map();
let lookupSeq = 0;

chat.addEventListener("click", e => {
  const w = e.target.closest(".npc .w");
  if (w) lookupWord(w.textContent);
});
document.getElementById("lookup-x").addEventListener("click", hideLookup);

function hideLookup() { lookupEl.style.display = "none"; }

function setLookup(word, rest) {
  lookupBody.innerHTML = "";
  lookupBody.appendChild(document.createTextNode("🔎 "));
  lookupBody.appendChild(text("b", null, word));
  lookupBody.appendChild(document.createTextNode(" " + rest));
  lookupEl.style.display = "flex";
}

function stripHtml(html) {
  return new DOMParser().parseFromString(html, "text/html").body.textContent || "";
}

async function fetchJson(url, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    if (!res.ok) return null; // 404 = word not found, not an outage
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}

/* Wiktionary: a real dictionary — we read only the word's SPANISH section,
   so English homographs never leak in. Retries capitalized for proper nouns. */
async function wiktionary(w) {
  for (const form of [w, w[0].toUpperCase() + w.slice(1)]) {
    const data = await fetchJson(
      "https://en.wiktionary.org/api/rest_v1/page/definition/" + encodeURIComponent(form), 6000);
    const groups = data && data.es;
    if (!groups) continue;
    const parts = [];
    for (const g of groups) {
      for (const d of g.definitions || []) {
        const t = stripHtml(d.definition || "").trim();
        if (t) parts.push(t.length > 90 ? t.slice(0, 87) + "…" : t);
        if (parts.length === 2) break;
      }
      if (parts.length === 2) break;
    }
    if (parts.length) return parts.join(" · ");
  }
  return null;
}

/* MyMemory fallback for slang Wiktionary lacks; drops echo-backs and low-confidence junk */
async function mymemory(w) {
  const data = await fetchJson(
    "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(w) + "&langpair=es|en", 6000);
  const rd = data && data.responseData;
  if (!rd || !rd.translatedText) return null;
  const tr = rd.translatedText.toLowerCase().trim();
  if (tr === w || !(rd.match >= 0.75) || /INVALID|NO QUERY|PLEASE SELECT/i.test(tr)) return null;
  return tr;
}

async function lookupWord(raw) {
  const w = raw.replace(/[^\p{L}\p{M}'’-]/gu, "").toLowerCase();
  if (!w) return;
  const seq = ++lookupSeq;
  if (lookupCache.has(w)) return setLookup(w, "— " + lookupCache.get(w));
  setLookup(w, "…");
  let result = null, offline = false;
  try {
    result = await wiktionary(w);
    if (!result) result = await mymemory(w);
  } catch (err) {
    offline = true;
  }
  if (seq !== lookupSeq) return;
  if (result) {
    lookupCache.set(w, result);
    setLookup(w, "— " + result);
  } else {
    setLookup(w, offline ? "— sin internet, no hay diccionario 😔" : "— no encontré esta palabra 🤷");
  }
}

/* ---------- end screens ---------- */
function endScene(won) {
  busy = true;
  hideLookup();
  choicesEl.innerHTML = "";
  const scene = S.scene;
  chat.appendChild(text("div", "line", won ? scene.winText : scene.failText));
  scrollChat();
  if (won) confetti(scene.color);

  later(wait(won ? 1500 : 900), () => {
    sheet.innerHTML = "";
    sheet.appendChild(text("h2", null, won ? scene.emoji + " ¡Lo lograste!" : "😵 Te perdiste..."));
    sheet.appendChild(text("p", "sub", won ? scene.winText : scene.failText));

    const stats = el("div", "stats");
    for (const [v, l] of [[S.turns, "turnos"], ["❤️".repeat(S.hearts) || "💔", "corazones"], ["🌵×" + S.lifelinesUsed, "usadas"]]) {
      const st = el("div", "stat");
      st.appendChild(text("b", null, String(v)));
      st.appendChild(text("small", null, l));
      stats.appendChild(st);
    }
    sheet.appendChild(stats);

    if (won) {
      const v = el("div", "vocab");
      v.appendChild(text("h3", null, "Palabras nuevas"));
      for (const [es, en] of scene.vocab) {
        const row = el("div", "row");
        row.appendChild(text("span", "es", es));
        row.appendChild(text("span", "en", en));
        v.appendChild(row);
      }
      sheet.appendChild(v);
    }

    const btns = el("div", "btns");
    const again = text("button", "btn primary", "Otra vez");
    again.addEventListener("click", () => startScene(S.key));
    const menu = text("button", "btn ghost", "Escenas");
    menu.addEventListener("click", showHome);
    btns.appendChild(again);
    btns.appendChild(menu);
    sheet.appendChild(btns);

    overlay.style.display = "flex";
  });
}

/* ---------- confetti (CSS animations only) ---------- */
function confetti(accent) {
  if (REDUCED) return;
  const colors = [accent, "#f5d90a", "#3b9eff", "#e93d82", "#46a758", "#fff"];
  for (let i = 0; i < 70; i++) {
    const p = el("i");
    p.style.left = Math.random() * 100 + "%";
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = 2.2 + Math.random() * 1.8 + "s";
    p.style.animationDelay = Math.random() * 0.8 + "s";
    p.style.transform = "rotate(" + Math.random() * 360 + "deg)";
    confettiEl.appendChild(p);
    setTimeout(() => p.remove(), 5200);
  }
}

/* ---------- keyboard shortcuts (1–4) ---------- */
document.addEventListener("keydown", e => {
  const n = parseInt(e.key, 10);
  if (!n || n > 4) return;
  if (overlay.style.display === "flex") return;
  if (home.style.display !== "none" && home.style.display !== "") {
    const cards = home.querySelectorAll(".card");
    if (cards[n - 1]) cards[n - 1].click();
    return;
  }
  const btns = choicesEl.querySelectorAll(".choice");
  if (btns[n - 1]) btns[n - 1].click();
});

document.getElementById("btn-home").addEventListener("click", showHome);

showHome();
</script>
